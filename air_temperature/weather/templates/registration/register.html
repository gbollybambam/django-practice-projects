{% extends "base_generic.html" %}

{% block content %}
<section>
    <h2>Register</h2>
    <div>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
    </div>
    <p>Already have an account ? <a href="{% url 'login' %}">Login here</a>.</p>
</section>
{% endblock %}
